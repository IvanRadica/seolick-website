<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEOLICK — We LICK websites. For brands with authority.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:       #E52828;
      --black:     #000;
      --white:     #fff;
      --dim:       rgba(255,255,255,0.45);
      --faint:     rgba(255,255,255,0.06);
      --border:    rgba(255,255,255,0.08);
      --red-dim:   rgba(229,40,40,0.12);
      --sans:      'Montserrat', sans-serif;
      --mono:      'Source Code Pro', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    /* ══════════════════════════════
       NAV
    ══════════════════════════════ */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 64px;
      padding: 0 clamp(24px, 5vw, 80px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.4s ease, border-color 0.4s ease;
      border-bottom: 1px solid transparent;
    }

    .nav.scrolled {
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-color: var(--border);
    }

    .nav-logo {
      font-weight: 900;
      font-size: 17px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
    }
    .nav-logo em { color: var(--red); font-style: normal; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: clamp(20px, 3vw, 40px);
    }

    .nav-links {
      display: flex;
      gap: clamp(16px, 2.5vw, 32px);
      list-style: none;
    }

    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }

    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
    }
    .lang-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: rgba(255,255,255,0.25);
      font: inherit;
      transition: color 0.2s;
    }
    .lang-btn.active { color: var(--red); }
    .lang-btn:hover  { color: var(--white); }
    .lang-sep        { color: rgba(255,255,255,0.12); }

    @media (max-width: 600px) {
      .nav-links { display: none; }
    }

    /* ══════════════════════════════
       HERO
    ══════════════════════════════ */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Letters (v1, unchanged) ── */
    .letters {
      display: flex;
      gap: clamp(20px, 4vw, 60px);
      align-items: flex-start;
    }

    .letter-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 0;
    }

    .letter {
      font-size: clamp(80px, 14vw, 180px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    .descriptor {
      font-family: var(--mono);
      font-size: clamp(9px, 1vw, 13px);
      font-weight: 600;
      color: rgba(255,255,255,0);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      text-align: center;
      line-height: 1.6;
    }

    .divider-wrap {
      width: clamp(300px, 70vw, 900px);
      margin: 48px 0 40px;
      height: 1px;
      overflow: hidden;
    }

    .divider-line {
      width: 0%;
      height: 100%;
      background: var(--red);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tagline {
      font-size: clamp(14px, 2vw, 22px);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--white);
      opacity: 0;
      transform: translateY(14px);
      text-align: center;
    }
    .tagline em { color: var(--red); font-style: normal; }

    .hero-logo {
      margin-top: 72px;
      font-size: clamp(13px, 1.4vw, 17px);
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      color: rgba(255,255,255,0.35);
    }

    /* ── Scroll indicator ── */
    .scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .scroll-hint.show { opacity: 1; }

    .scroll-hint-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .scroll-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, rgba(229,40,40,0.7), transparent);
      animation: scrollPulse 1.6s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* ══════════════════════════════
       SHARED SECTION STYLES
    ══════════════════════════════ */
    .section {
      padding: clamp(80px, 12vh, 140px) clamp(24px, 5vw, 80px);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 28px;
    }

    .section-title {
      font-size: clamp(28px, 4.5vw, 56px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.025em;
      margin-bottom: 24px;
    }

    .section-intro {
      font-size: clamp(14px, 1.5vw, 18px);
      color: rgba(255,255,255,0.5);
      max-width: 580px;
      line-height: 1.75;
      margin-bottom: clamp(48px, 8vh, 96px);
    }

    /* ══════════════════════════════
       LICK FRAMEWORK SECTION
    ══════════════════════════════ */
    .framework-section {
      border-top: 1px solid var(--border);
    }

    /* ── Pillar grid ── */
    .pillars {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--border);
    }

    .pillar-card {
      padding: clamp(28px, 3vw, 48px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-right: 1px solid var(--border);
      transition: background 0.3s ease;
      cursor: default;
    }
    .pillar-card:last-child { border-right: none; }
    .pillar-card:hover { background: var(--red-dim); }

    .pillar-letter {
      font-size: clamp(56px, 7vw, 100px);
      font-weight: 900;
      line-height: 1;
      color: var(--red);
      letter-spacing: -0.03em;
    }

    .pillar-name {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .pillar-rule {
      width: 28px;
      height: 1px;
      background: var(--red);
      margin: 4px 0;
    }

    .pillar-tagline {
      font-size: clamp(13px, 1.2vw, 15px);
      font-weight: 700;
      line-height: 1.45;
      color: var(--white);
    }

    .pillar-desc {
      font-size: clamp(12px, 1vw, 13px);
      color: rgba(255,255,255,0.38);
      line-height: 1.75;
      flex: 1;
    }

    .pillar-includes {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .pillar-includes li {
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pillar-includes li::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      opacity: 0.6;
    }

    @media (max-width: 960px) {
      .pillars {
        grid-template-columns: repeat(2, 1fr);
      }
      .pillar-card:nth-child(2) { border-right: none; }
      .pillar-card:nth-child(1),
      .pillar-card:nth-child(2) {
        border-bottom: 1px solid var(--border);
      }
    }

    @media (max-width: 540px) {
      .pillars { grid-template-columns: 1fr; }
      .pillar-card { border-right: none; border-bottom: 1px solid var(--border); }
      .pillar-card:last-child { border-bottom: none; }
    }

    /* ══════════════════════════════
       AEO SECTION
    ══════════════════════════════ */
    .aeo-section { border-top: 1px solid var(--border); }

    .aeo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(40px, 6vw, 96px);
      align-items: start;
    }

    /* ── Claims (left) ── */
    .aeo-claims {
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
    }

    .aeo-claim {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: clamp(16px, 2vw, 28px);
      padding: clamp(20px, 2.5vw, 32px) 0;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .aeo-section.in .aeo-claim { opacity: 1; transform: none; }
    .aeo-section.in .aeo-claim:nth-child(1) { transition-delay: 0.1s; }
    .aeo-section.in .aeo-claim:nth-child(2) { transition-delay: 0.25s; }
    .aeo-section.in .aeo-claim:nth-child(3) { transition-delay: 0.4s; }

    .aeo-claim-index {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--red);
      padding-top: 5px;
    }

    .aeo-claim-name {
      font-size: clamp(16px, 1.8vw, 22px);
      font-weight: 900;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .aeo-claim-desc {
      font-size: clamp(13px, 1.1vw, 14px);
      color: rgba(255,255,255,0.45);
      line-height: 1.75;
    }

    /* ── Answer-engine mock (right) ── */
    .answer-mock {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      font-family: var(--mono);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease 0.2s, transform 0.6s ease 0.2s;
    }
    .aeo-section.in .answer-mock { opacity: 1; transform: none; }

    .answer-mock-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .mock-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    .mock-dot:first-child { background: rgba(229,40,40,0.6); }
    .answer-mock-title {
      margin-left: auto;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .answer-mock-body {
      padding: clamp(20px, 2.5vw, 32px);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .mock-query {
      display: flex;
      gap: 10px;
      align-items: baseline;
      font-size: clamp(13px, 1.2vw, 15px);
      font-weight: 600;
      color: var(--white);
    }
    .mock-prompt { color: var(--red); }
    .mock-cursor {
      display: inline-block;
      width: 8px;
      height: 1.05em;
      background: var(--red);
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: cursorBlink 0.9s steps(1) infinite;
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    .mock-lines {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .mock-line {
      height: 10px;
      background: rgba(255,255,255,0.06);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .mock-answer {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 14px 16px;
      border: 1px solid rgba(229,40,40,0.4);
      background: var(--red-dim);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .mock-answer-chip {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
    }
    .mock-answer-text {
      font-size: clamp(12px, 1.1vw, 14px);
      font-weight: 600;
      color: var(--white);
      line-height: 1.5;
    }

    .answer-mock.answered .mock-line,
    .answer-mock.answered .mock-answer { opacity: 1; transform: none; }
    .answer-mock.answered .mock-lines > :nth-child(1) { transition-delay: 0.05s; }
    .answer-mock.answered .mock-lines > :nth-child(2) { transition-delay: 0.2s; }
    .answer-mock.answered .mock-lines > :nth-child(3) { transition-delay: 0.45s; }
    .answer-mock.answered .mock-lines > :nth-child(4) { transition-delay: 0.75s; }

    .mock-engines {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .mock-engine {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      border: 1px solid var(--border);
      padding: 6px 10px;
    }

    @media (max-width: 900px) {
      .aeo-grid { grid-template-columns: 1fr; }
    }

    /* ══════════════════════════════
       PROOF / RESULTS SECTION
    ══════════════════════════════ */
    .results-section { border-top: 1px solid var(--border); }

    /* Stats strip */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--border);
      margin-bottom: clamp(48px, 7vh, 80px);
    }

    .stat-item {
      padding: clamp(24px, 3vw, 40px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .stat-item:last-child { border-right: none; }

    .stat-number {
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--white);
    }
    .stat-number em { color: var(--red); font-style: normal; }

    .stat-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .stats-strip { grid-template-columns: 1fr; }
      .stat-item { border-right: none; border-bottom: 1px solid var(--border); }
      .stat-item:last-child { border-bottom: none; }
    }

    /* Case study cards */
    .cases {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .case-card {
      background: var(--black);
      padding: clamp(24px, 3vw, 40px);
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: background 0.3s ease;
    }
    .case-card:hover { background: var(--red-dim); }

    .case-industry {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
    }

    .case-meta {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .case-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .case-row-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .case-row-text {
      font-size: clamp(13px, 1.2vw, 15px);
      font-weight: 700;
      color: var(--white);
      line-height: 1.4;
    }

    .case-result-stat {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--red);
      line-height: 1;
    }

    .case-result-sub {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 6px;
    }

    @media (max-width: 860px) {
      .cases { grid-template-columns: 1fr; }
    }

    /* ══════════════════════════════
       SERVICES SECTION
    ══════════════════════════════ */
    .services-section { border-top: 1px solid var(--border); }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .service-card {
      background: var(--black);
      padding: clamp(28px, 3vw, 48px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: background 0.3s ease;
    }
    .service-card:hover { background: var(--red-dim); }

    .service-tag {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .service-name {
      font-size: clamp(18px, 2vw, 26px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .service-rule {
      width: 28px;
      height: 1px;
      background: var(--red);
    }

    .service-desc {
      font-size: clamp(13px, 1.1vw, 14px);
      color: rgba(255,255,255,0.45);
      line-height: 1.75;
      flex: 1;
    }

    .service-includes {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .service-includes li {
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .service-includes li::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      opacity: 0.6;
    }

    @media (max-width: 860px) {
      .services-grid { grid-template-columns: 1fr; }
    }

    /* ══════════════════════════════
       CONTACT / CTA SECTION
    ══════════════════════════════ */
    .contact-section {
      border-top: 1px solid var(--border);
    }

    .contact-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 32px;
      max-width: 640px;
    }

    .contact-title {
      font-size: clamp(36px, 6vw, 80px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .contact-title em { color: var(--red); font-style: normal; }

    .contact-sub {
      font-size: clamp(14px, 1.5vw, 18px);
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
    }

    .contact-email {
      font-family: var(--mono);
      font-size: clamp(13px, 1.3vw, 16px);
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px solid rgba(229,40,40,0.4);
      padding-bottom: 3px;
      transition: border-color 0.2s;
    }
    .contact-email:hover { border-color: var(--red); }

    .contact-cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--red);
      color: var(--white);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 16px 32px;
      transition: opacity 0.2s;
    }
    .contact-cta:hover { opacity: 0.85; }
    .contact-cta-arrow { font-size: 16px; }

    /* ── Footer ── */
    .site-footer {
      padding: 32px clamp(24px, 5vw, 80px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .footer-logo {
      font-weight: 900;

    function renderCopy() {
      const c = COPY[lang];

      // Nav links
      const anchors = ['#framework', '#aeo', '#results', '#services', '#contact'];
      document.getElementById('nav-links').innerHTML = c.nav
        .map((label, i) => `<li><a href="${anchors[i]}">${label}</a></li>`)
        .join('');

      // All simple data-copy elements
      const map = {
        'framework.label': c.framework.label,
        'framework.intro': c.framework.intro,
        'aeo.label':       c.aeo.label,
        'aeo.intro':       c.aeo.intro,
        'aeo.mockChip':    c.aeo.mockChip,

        'results.label':   c.results.label,
        'results.intro':   c.results.intro,
        'services.label':  c.services.label,
        'services.intro':  c.services.intro,
        'contact.label':   c.contact.label,
        'contact.sub':     c.contact.sub,
        'contact.cta':     c.contact.cta,
        'footer.copy':     c.footer.copy,
      };
      Object.entries(map).forEach(([key, val]) => {
        document.querySelectorAll(`[data-copy="${key}"]`)
          .forEach(el => el.textContent = val);
      });

      // Titles with line breaks
      document.querySelector('[data-copy="framework.title"]').innerHTML =
        c.framework.title.replace(/\n/g, '<br>');
      document.querySelector('[data-copy="aeo.title"]').innerHTML =
        c.aeo.title.replace(/\n/g, '<br>');
      document.querySelector('[data-copy="results.title"]').innerHTML =
        c.results.title.replace(/\n/g, '<br>');
      document.querySelector('[data-copy="services.title"]').innerHTML =
        c.services.title.replace(/\n/g, '<br>');

      // Results — stats

          <div class="stat-number">${s.number}</div>
          <div class="stat-label">${s.label.replace(/\n/g, '<br>')}</div>
        </div>

        </div>
      `).join('');

      // Contact title with accent
      const ct = c.contact;
      document.getElementById('contact-title').innerHTML =
        ct.title.replace(ct.titleAccent, `<em>${ct.titleAccent}</em>`);

      // Pillar cards
      document.getElementById('pillars').innerHTML = c.pillars.map(p => `
        <div class="pillar-card">
          <div class="pillar-letter">${p.letter}</div>
          <div class="pillar-name">${p.name}</div>
          <div class="pillar-rule"></div>
          <div class="pillar-tagline">${p.tagline.replace(/\n/g, '<br>')}</div>
          <div class="pillar-desc">${p.desc}</div>
          <ul class="pillar-includes">
            ${p.includes.map(item => `<li>${item}</li>`).join('')}
          </ul>
        </div>
      `).join('');

      // AEO claims
      document.getElementById('aeo-claims').innerHTML = c.aeo.claims.map((cl, i) => `
        <div class="aeo-claim">
          <div class="aeo-claim-index">0${i + 1}</div>
          <div>
            <div class="aeo-claim-name">${cl.name}</div>
            <div class="aeo-claim-desc">${cl.desc}</div>
          </div>
        </div>
      `).join('');

      // AEO mock query — typed on first reveal; instant swap on later lang change
      if (aeoPlayed) {
        document.getElementById('mock-query-text').textContent = c.aeo.mockQuery;
      }

      // Placeholders
      ['results','services','contact'].forEach(key => {
        const el = document.querySelector(`[data-copy="placeholder.${key}"]`);
        if (el) el.textContent = c.placeholder[key];
      });
    }

    /* ══════════════════════════════
       NAV SCROLL BEHAVIOUR
    ══════════════════════════════ */
    window.addEventListener('scroll', () => {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
    }, { passive: true });

    /* ══════════════════════════════
       AEO — SCROLL REVEAL + TYPEWRITER
    ══════════════════════════════ */
    let aeoPlayed = false;

    function playAeo() {
      if (aeoPlayed) return;
      aeoPlayed = true;
      document.getElementById('aeo').classList.add('in');

      const full   = COPY[lang].aeo.mockQuery;
      const target = document.getElementById('mock-query-text');
      let i = 0;

      const type = () => {
        if (i <= full.length) {
          target.textContent = full.slice(0, i);
          i++;
          setTimeout(type, 45);
        } else {
          document.getElementById('answer-mock').classList.add('answered');
        }
      };
      setTimeout(type, 500);
    }

    new IntersectionObserver((entries, obs) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          playAeo();
          obs.disconnect();
        }
      });
    }, { threshold: 0.2 }).observe(document.getElementById('aeo'));

    /* ══════════════════════════════
       HERO ANIMATION (v1 — unchanged)
    ══════════════════════════════ */
    const STEP = 750;
    const steps = [
      { group: 'lg-l', letter: 'lt-l', desc: 'dc-l', t: 400 },
      { group: 'lg-i', letter: 'lt-i', desc: 'dc-i', t: 400 + STEP },
      { group: 'lg-c', letter: 'lt-c', desc: 'dc-c', t: 400 + STEP * 2 },
      { group: 'lg-k', letter: 'lt-k', desc: 'dc-k', t: 400 + STEP * 3 },
    ];

    let timers = [];

    function runHero() {
      steps.forEach(({ group, letter, desc, t }) => {
        timers.push(setTimeout(() => {
          const g = document.getElementById(group);
          void g.offsetWidth;
          g.style.animation = 'letterIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards';
        }, t));

        timers.push(setTimeout(() => {
          const d = document.getElementById(desc);
          void d.offsetWidth;
          d.style.animation = 'descriptorIn 0.4s ease forwards';
        }, t + 280));
      });

      const redAt = steps[steps.length - 1].t + 480;

      timers.push(setTimeout(() => {
        ['lt-l','lt-i','lt-c','lt-k'].forEach(id => {
          const el = document.getElementById(id);
          void el.offsetWidth;
          el.style.animation = 'turnRed 0.35s ease forwards';
        });
      }, redAt));

      timers.push(setTimeout(() => {
        const d = document.getElementById('divider');
        void d.offsetWidth;
        d.style.transition = 'width 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
        d.style.width = '100%';
      }, redAt + 300));

      timers.push(setTimeout(() => {
        const t = document.getElementById('tagline');
        void t.offsetWidth;
        t.style.animation = 'taglineIn 0.7s ease forwards';
      }, redAt + 900));

      timers.push(setTimeout(() => {
        const l = document.getElementById('hero-logo');
        void l.offsetWidth;
        l.style.animation = 'fadeIn 0.8s ease forwards';
      }, redAt + 1600));

      // Show scroll indicator after animation completes
      timers.push(setTimeout(() => {
        document.getElementById('scroll-hint').classList.add('show');
      }, redAt + 2400));
    }

    /* ══════════════════════════════
       INIT
    ══════════════════════════════ */
    renderCopy();
    runHero();
  </script>
</body>
</html>
