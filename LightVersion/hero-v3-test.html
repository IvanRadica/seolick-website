<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEO LICK — Hero v3 (SEOLICK + tongue in O) — TEST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* ─────────────────────────────────────────────────────────────
     SEO LICK — HERO v3 (TEST ONLY)
     Base: v2 (S·E·O·L·I·C·K reveal, no descriptors, S-E-O black,
     L-I-C-K red). NEW in v3: the brand tongue (icon.svg) grows inside
     the letter O as the closing beat — identical to the logo lockup
     (black O, red tongue nested in the counter).
     Changes nothing in the live site. Open directly to test.
     Tuning: edit --tw (tongue width) and --ty (vertical center) on
     .o-tongue if the tongue needs nudging inside the O.
     ───────────────────────────────────────────────────────────── */
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#fff;color:#111;font-family:'Roboto',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  ::selection{background:#e12c2c;color:#fff}

  .hero-lick{
    --red:#e12c2c;
    min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    overflow:hidden;position:relative;
    padding:3rem 1.25rem 4rem;
    background:#fff;
  }
  .hero-lick .letters{
    display:flex;
    gap:clamp(8px,1.8vw,36px);
    align-items:center;
  }
  .hero-lick .letter-group{opacity:0}
  .hero-lick .letter{
    font-family:'Montserrat',sans-serif;
    font-size:clamp(40px,8.8vw,128px);
    font-weight:900;line-height:1;
    letter-spacing:-0.02em;
    color:#111;
  }

  /* O + nested tongue */
  .hero-lick .o-wrap{position:relative;display:inline-block}
  .hero-lick .o-tongue{
    /* Measured from the logo vector (getBBox): tongue center 69%/77% of the
       O, width 65% of O, right edge ~102% (spills just past O), bottom flush,
       zero rotation. Values below are in wrap-box terms and map to that. */
    --tw:65%;   /* tongue width, % of the O box */
    --tx:70%;   /* tongue horizontal center, % (lower-RIGHT of O, like the logo) */
    --ty:71%;   /* tongue vertical center, % (low, like the logo) */
    --tr:0deg;  /* logo tongue is not rotated */
    position:absolute;
    left:var(--tx);top:var(--ty);
    width:var(--tw);height:auto;
    transform:translate(-50%,-50%) scale(0.25) rotate(calc(var(--tr) - 10deg));
    opacity:0;
    pointer-events:none;
    will-change:transform,opacity;
  }

  .hero-lick .divider-wrap{
    width:clamp(300px,70vw,900px);
    margin:48px 0 40px;height:1px;overflow:hidden;
  }
  .hero-lick .divider-line{
    width:0%;height:100%;background:var(--red);
    transition:width .8s cubic-bezier(.4,0,.2,1);
  }
  .hero-lick .tagline{
    font-family:'Montserrat',sans-serif;
    font-size:clamp(14px,2vw,22px);font-weight:700;letter-spacing:.04em;
    color:#111;opacity:0;transform:translateY(14px);text-align:center;
  }
  .hero-lick .tagline em{color:var(--red);font-style:normal}
  .hero-lick .hero-logo{
    margin-top:72px;
    font-family:'Montserrat',sans-serif;
    font-size:clamp(13px,1.4vw,17px);font-weight:700;letter-spacing:.25em;
    text-transform:uppercase;opacity:0;color:rgba(0,0,0,.5);
  }
  .hero-lick .scroll-hint{
    position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:8px;
    opacity:0;transition:opacity .6s ease;
  }
  .hero-lick .scroll-hint.show{opacity:1}
  .hero-lick .scroll-hint-label{
    font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.22em;
    text-transform:uppercase;color:rgba(0,0,0,.35);
  }
  .hero-lick .scroll-line{
    width:1px;height:36px;
    background:linear-gradient(to bottom,rgba(225,44,44,.7),transparent);
    animation:hl-scrollPulse 1.6s ease-in-out infinite;
  }
  .hero-lick .hero-replay{
    position:absolute;bottom:28px;right:clamp(20px,5vw,80px);
    background:none;border:none;cursor:pointer;
    font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;color:rgba(0,0,0,.35);padding:8px;
    transition:color .2s ease;
  }
  .hero-lick .hero-replay:hover{color:var(--red)}

  .v2-badge{
    position:absolute;top:20px;left:clamp(20px,5vw,80px);
    font-family:'Roboto Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.2em;text-transform:uppercase;
    color:#fff;background:#e12c2c;padding:5px 10px;border-radius:2px;
  }

  @media (max-width:520px){
    .hero-lick .letters{gap:6px}
    .hero-lick .letter{font-size:clamp(30px,10.5vw,52px)}
    .hero-lick .tagline{font-size:14px;padding:0 10px}
    .hero-lick .hero-logo{margin-top:48px}
  }

  @keyframes hl-scrollPulse{0%,100%{opacity:.4}50%{opacity:1}}
  @keyframes letterIn{
    0%{opacity:0;transform:scale(1.5) translateY(-16px);filter:blur(8px)}
    60%{filter:blur(0px)}
    100%{opacity:1;transform:scale(1) translateY(0)}
  }
  @keyframes turnRed{from{color:#111}to{color:var(--red)}}
  @keyframes taglineIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes tongueIn{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.25) rotate(calc(var(--tr) - 10deg))}
    55%{opacity:1}
    100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(var(--tr))}
  }

  @media (prefers-reduced-motion:reduce){
    .hero-lick .letter-group{opacity:1}
    .hero-lick .letter{color:#111}
    #lt-l,#lt-i,#lt-c,#lt-k{color:var(--red)}
    .hero-lick .o-tongue{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(var(--tr))}
    .hero-lick .divider-line{width:100%;transition:none}
    .hero-lick .tagline{opacity:1;transform:none}
    .hero-lick .hero-logo{opacity:1}
    .hero-lick .scroll-hint{opacity:1}
    .hero-lick .scroll-line{animation:none}
    .hero-lick .hero-replay{display:none}
  }
</style>
</head>
<body>
<section class="hero-lick" id="hero" aria-label="SEO LICK">
  <span class="v2-badge">Hero v3 · test</span>

  <div class="letters" id="letters">
    <div class="letter-group" id="lg-s"><div class="letter" id="lt-s">S</div></div>
    <div class="letter-group" id="lg-e"><div class="letter" id="lt-e">E</div></div>
    <div class="letter-group" id="lg-o">
      <div class="letter o-wrap" id="lt-o">O<svg class="o-tongue" id="o-tongue" viewBox="0 0 372.82 246.11" fill="#e12c2c" aria-hidden="true"><path d="M370.92,150.92c-10.34,53.73-62.18,90.52-117.21,94.76-.55.04-1.1.08-1.65.11-30.82,2.03-60.66-5.57-87.17-21.17-14.92-8.77-27.66-19.52-38.28-33.28-7.48-9.69-13.84-19.6-19.63-30.44l-17.63-33.06c-6.17-11.55-12.65-22.3-20.86-32.56C51.46,72.57,28.23,56.91,0,48.64c9.83-8.37,27.66-16.93,42.83-23.16,11.72-4.81,21.85-8.24,25.52-9.16,7.12-1.59,11.42-1.7,15.68-1.99,3.33-.25,11.53-.28,16.45,0,5.76.32,11.55.59,17.13,2.2,12.59,3.65,32.45,16.23,41.97,25.45,11.45,11.08,21.49,23.15,29.76,36.84,5.57,9.24,11.66,17.49,19.99,24.33,8.84,7.23,19.14,12.65,30.63,12.95,3.9.11,8.14-1,10.03-4.24,3.48-5.96-4.66-21.07-8.03-26.98-2.8-4.92-5.76-9.69-8.92-14.31-6.53-9.64-13.8-18.69-21.83-27.32-16.09-17.13-46.12-33.38-69.75-40.31C159.7-.17,189.33.08,206.73.1c28.82-.83,60.45,3.18,87.26,15.17,1.31.59,2.86.95,4.01,1.59l9.03,5.07c13.63,7.67,18.65,13.31,29.82,23.04,9.35,11.72,17.72,23.1,23.99,36.5,6.57,13.97,11.23,29.63,11.89,45.25.34,8.39-.3,16.47-1.8,24.2Z"/></svg></div>
    </div>
    <div class="letter-group" id="lg-l"><div class="letter" id="lt-l">L</div></div>
    <div class="letter-group" id="lg-i"><div class="letter" id="lt-i">I</div></div>
    <div class="letter-group" id="lg-c"><div class="letter" id="lt-c">C</div></div>
    <div class="letter-group" id="lg-k"><div class="letter" id="lt-k">K</div></div>
  </div>

  <div class="divider-wrap"><div class="divider-line" id="divider"></div></div>

  <div class="tagline" id="tagline">We <em>LICK</em> websites. For organic growth.</div>

  <div class="hero-logo" id="hero-logo">SEOLICK</div>

  <div class="scroll-hint" id="scroll-hint">
    <span class="scroll-hint-label">Scroll</span>
    <div class="scroll-line"></div>
  </div>

  <button class="hero-replay" id="hero-replay" type="button" aria-label="Replay animation">&#8635; Replay</button>
</section>

<script>
(function () {
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var replayBtn = document.getElementById('hero-replay');
  if (reduce) return; // resting state handled by CSS

  var STEP = 375; // 7th letter lands at 2650ms — same window as the current hero
  var order = ['s', 'e', 'o', 'l', 'i', 'c', 'k'];
  var steps = order.map(function (ch, i) {
    return { group: 'lg-' + ch, letter: 'lt-' + ch, t: 400 + STEP * i };
  });

  var redIds = ['lt-l', 'lt-i', 'lt-c', 'lt-k']; // S-E-O stay black, like the logo

  var timers = [];

  function runHero() {
    steps.forEach(function (s) {
      timers.push(setTimeout(function () {
        var g = document.getElementById(s.group);
        if (!g) return;
        void g.offsetWidth;
        g.style.animation = 'letterIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards';
      }, s.t));
    });

    var redAt = steps[steps.length - 1].t + 480; // 3130ms

    timers.push(setTimeout(function () {
      redIds.forEach(function (id) {
        var el = document.getElementById(id);
        if (!el) return;
        void el.offsetWidth;
        el.style.animation = 'turnRed 0.35s ease forwards';
      });
    }, redAt));

    timers.push(setTimeout(function () {
      var d = document.getElementById('divider');
      if (!d) return;
      void d.offsetWidth;
      d.style.transition = 'width 0.9s cubic-bezier(0.4,0,0.2,1)';
      d.style.width = '100%';
    }, redAt + 300));

    timers.push(setTimeout(function () {
      var t = document.getElementById('tagline');
      if (!t) return;
      void t.offsetWidth;
      t.style.animation = 'taglineIn 0.7s ease forwards';
    }, redAt + 900));

    // NEW v3: the tongue grows inside the O — the closing brand beat.
    timers.push(setTimeout(function () {
      var tg = document.getElementById('o-tongue');
      if (!tg) return;
      void tg.offsetWidth;
      tg.style.animation = 'tongueIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards';
    }, redAt + 1000));

    timers.push(setTimeout(function () {
      var l = document.getElementById('hero-logo');
      if (!l) return;
      void l.offsetWidth;
      l.style.animation = 'fadeIn 0.8s ease forwards';
    }, redAt + 1600));

    timers.push(setTimeout(function () {
      var s = document.getElementById('scroll-hint');
      if (s) s.classList.add('show');
    }, redAt + 2400));
  }

  function replayHero() {
    timers.forEach(clearTimeout);
    timers = [];
    steps.forEach(function (s) {
      var g = document.getElementById(s.group);
      var l = document.getElementById(s.letter);
      if (g) g.style.animation = '';
      if (l) l.style.animation = '';
    });
    var tg = document.getElementById('o-tongue');
    if (tg) tg.style.animation = '';
    var divider = document.getElementById('divider');
    if (divider) {
      divider.style.transition = 'none';
      divider.style.width = '0%';
      void divider.offsetWidth;
    }
    var tagline = document.getElementById('tagline');
    if (tagline) tagline.style.animation = '';
    var logo = document.getElementById('hero-logo');
    if (logo) logo.style.animation = '';
    var hint = document.getElementById('scroll-hint');
    if (hint) hint.classList.remove('show');
    requestAnimationFrame(function () { runHero(); });
  }

  if (replayBtn) replayBtn.addEventListener('click', replayHero);

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runHero);
  } else {
    runHero();
  }
})();
</script>
</body>
</html>
